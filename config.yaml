image:
  max_size: 1600
  paper_color: [248, 245, 238]

analysis:
  use_clahe: true
  saliency_weight: 0.35
  edge_weight: 0.25
  center_weight: 0.2
  contrast_weight: 0.2

drawing:
  detail_level: 0.75
  stroke_density: 0.8
  contour_strength: 1.0
  hatch_strength: 0.85
  texture_strength: 0.65
  sky_suppression: 0.9
  background_simplification: 0.7
  subject_boost: 1.3

hatching:
  min_spacing_px: 4
  max_spacing_px: 22
  dark_threshold: 0.35
  mid_threshold: 0.65
  building_angle_deg: 45
  cross_hatch_dark_regions: true

stroke:
  base_width_px: 1.1
  width_variation: 0.25
  jitter_px: 0.7
  building_jitter_px: 0.25
  vegetation_jitter_px: 1.4
  opacity_min: 0.45
  opacity_max: 0.95
  random_seed: 42

svg:
  export: true
  simplify_tolerance: 1.2
  group_by_layer: true
  scale_to_mm: true
  page_size: A4

